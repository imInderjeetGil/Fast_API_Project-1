name: CI/CD to EC2 via Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/techzone-ecommerce:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (to get docker-compose.yml)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/techzone"

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy and Cleanup
        run: |
          # Dhyan dein: 'EOF' (with quotes) ki jagah sirf EOF use kiya hai
          # Isse ${{ secrets }} actually real values se replace honge server par.
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << EOF
          set -e
          
          mkdir -p /home/ubuntu/techzone
          cd /home/ubuntu/techzone

          echo "==> Clearing initial disk space (Dangling images/containers)"
          docker system prune -f

          # Create .env file - Ab values empty nahi jayengi
          cat > .env << ENVFILE
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=alchemydb
          DATABASE_URL=postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@techzone-postgres:5432/alchemydb
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ENV=prod
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          ENVFILE

          echo "==> Pulling latest images"
          docker-compose pull

          echo "==> Restarting services"
          docker-compose down --remove-orphans
          docker-compose up -d

          echo "==> DEEP CLEANUP: Removing all unused images (Crucial for space)"
          docker image prune -a -f

          echo "==> Final Disk Space Status:"
          df -h | grep '^/dev/'
          
          echo "✅ Deployment and Space Cleanup Successful!"
          EOF
